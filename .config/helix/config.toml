theme = "dark_plus"

[editor]
line-number = "relative"
cursorline = true
mouse = true

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'<' = '>'
'"' = '"'
'`' = '`'

[editor.lsp]
display-messages = true
display-inlay-hints = false

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending"]

[editor.indent-guides]
render = true
character = "."

[keys.normal]
A-g = ":run-shell-command ~/.config/helix/scripts/yazi-chooser.sh"
A-q = ":buffer-close"
A-w = ":write"
C-n = ":new"
C-r = ":config-reload"

